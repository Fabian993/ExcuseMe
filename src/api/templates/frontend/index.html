<!DOCTYPE html>
<html>
<body>
    <h1>Frontend</h1>
    <button onclick="sendData()">POST to API</button>
    <button onclick="putData()">PUT to API</button>
    <button onclick="getData()">GET to API</button>
    <button onclick="deleteData()">DELETE to API</button>
    
    <script>
    async function getData() {
    const response = await fetch('/api/');
    console.log(await response.json());
    }

    async function sendData() {
        const response = await fetch('/api/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({item: 'test'})
        });
        console.log(await response.json());
    }

    async function putData() {
    const response = await fetch('/api/', {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({item: 'test'})
    });
    console.log(await response.json());
    }

    async function deleteData() {
    const response = await fetch('/api/', {
        method: 'DELETE',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({item: 'test'})
    });
    console.log(await response.json());
    }
    </script>
</body>
</html>
